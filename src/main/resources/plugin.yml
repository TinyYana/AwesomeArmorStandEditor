name: AwesomeArmorStandEditor
description: $description
prefix: AwesomeArmorStandEditor
version: '${version}'

main: com.tinyyana.awesomeArmorStandEditor.AwesomeArmorStandEditorPlugin
api-version: '26.2'
load: POSTWORLD

authors: [ TinyYana ]
website: https://tinyyana.com

# No hard dependency — standalone, runs on Spigot or Paper. These are optional soft integrations
# (reflection-guarded): LycoLib audit log, GriefPrevention/WorldGuard region checks.
softdepend: [ LycoLib, GriefPrevention, WorldGuard ]

# Paper/Spigot library loader: kotlin stdlib version MUST match gradle/libs.versions.toml, NOT shaded.
libraries:
  - org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.4.20-Beta1

# Note: plugin.yml descriptions are read before the plugin loads, so they can't be translated.
# Every player-facing string lives in lang/<code>.yml — see `language` in config.yml.
commands:
  aase:
    description: Armor stand / display scene editor
    usage: /aase
    aliases: [ armorstand, ase ]

permissions:
  aase.use:
    description: Open the editor and use the edit tool
    default: true
  aase.create.armorstand:
    description: Place armor stand elements
    default: true
  aase.create.display:
    description: Place display elements
    default: true
  aase.scene.save:
    description: Save scenes (to your own save folder)
    default: true
  aase.scene.share:
    description: Generate / import share codes (nothing is written to the server)
    default: true
  aase.export.command:
    # Writes summon commands / mcfunction datapacks into the server's plugins folder — admins/builders only
    description: Export summon commands / mcfunction datapacks (writes server files)
    default: op
  aase.preset.save:
    # /aase pose save rewrites the server-wide presets.yml — admins/builders only
    description: Save a pose into the server-wide preset library (presets.yml)
    default: op
  aase.animate:
    description: Use keyframe animation
    default: true
  aase.clear:
    # /aase clear <radius> — only other people's elements, only on blocks that player may build on; no aase.admin needed
    description: Clear other people's elements where you may build (inside a claim, only the owner and trusted players can)
    default: true
  aase.admin:
    # /aase admin whois|remove|purge — only touches elements this plugin placed, never hand-placed vanilla stands
    description: 'Admin: edit any build, look up owners, force-remove elements, reload'
    default: op
  aase.bypass.region:
    description: Bypass region protection checks
    default: op
  aase.bypass.limit:
    description: Bypass element caps
    default: op
