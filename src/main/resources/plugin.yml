name: AwesomeArmorStandEditor
description: $description
prefix: AwesomeArmorStandEditor
version: '${version}'

main: com.tinyyana.awesomeArmorStandEditor.AwesomeArmorStandEditorPlugin
api-version: '26.2'
load: POSTWORLD

authors: [ TinyYana ]
website: https://tinyyana.com

# No hard dependency — standalone, runs on Spigot or Paper. These are optional soft integrations
# (reflection-guarded): LycoLib audit log, GriefPrevention/WorldGuard region checks.
softdepend: [ LycoLib, GriefPrevention, WorldGuard ]

# Paper/Spigot library loader: kotlin stdlib version MUST match gradle/libs.versions.toml, NOT shaded.
libraries:
  - org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.4.20-Beta1

commands:
  aase:
    description: 盔甲座 / Display 場景編輯器
    usage: /aase
    aliases: [ armorstand, ase ]

permissions:
  aase.use:
    description: 開啟編輯器與使用編輯工具
    default: true
  aase.create.armorstand:
    description: 放置盔甲座元件
    default: true
  aase.create.display:
    description: 放置 Display 元件
    default: true
  aase.scene.save:
    description: 儲存場景(存到自己的存檔資料夾)
    default: true
  aase.scene.share:
    description: 產生 / 匯入分享碼(不落地伺服器檔案)
    default: true
  aase.export.command:
    # 會把 summon 指令 / mcfunction 資料包寫進伺服器的 plugins 資料夾,預設只給管理員/建築師
    description: 匯出 summon 指令 / mcfunction 資料包(寫入伺服器檔案)
    default: op
  aase.preset.save:
    # /aase pose save 會改寫全服共用的 presets.yml,預設只給管理員/建築師
    description: 把姿勢存進全服共用的範本庫(presets.yml)
    default: op
  aase.animate:
    description: 使用關鍵影格動畫(P3)
    default: true
  aase.clear:
    # /aase clear <半徑> — 只清「別人的」元件,且只在該玩家有建築權的方塊上;不需要 aase.admin
    description: 清除別人放在你有建築權之處的元件(領地內只有領主與受信任者清得掉)
    default: true
  aase.admin:
    # /aase admin whois|remove|purge — 只作用於本插件放置的元件,不碰玩家手放的原版盔甲座
    description: 管理:編輯他人作品、查擁有者、強制移除他人元件、reload
    default: op
  aase.bypass.region:
    description: 略過領地檢查
    default: op
  aase.bypass.limit:
    description: 略過數量上限
    default: op
