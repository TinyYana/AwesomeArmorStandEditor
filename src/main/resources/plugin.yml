name: AwesomeArmorStandEditor
description: $description
prefix: AwesomeArmorStandEditor
version: '${version}'

main: com.tinyyana.awesomeArmorStandEditor.AwesomeArmorStandEditorPlugin
api-version: '26.2'
load: POSTWORLD

authors: [ TinyYana ]
website: https://tinyyana.com

# No hard dependency — standalone, runs on Spigot or Paper. These are optional soft integrations
# (reflection-guarded): LycoLib audit log, GriefPrevention/WorldGuard region checks.
softdepend: [ LycoLib, GriefPrevention, WorldGuard ]

# Paper/Spigot library loader: kotlin stdlib version MUST match gradle/libs.versions.toml, NOT shaded.
libraries:
  - org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.4.20-Beta1

commands:
  aase:
    description: 盔甲座 / Display 場景編輯器
    usage: /aase
    aliases: [ armorstand, ase ]

permissions:
  aase.use:
    description: 開啟編輯器與使用編輯工具
    default: true
  aase.create.armorstand:
    description: 放置盔甲座元件
    default: true
  aase.create.display:
    description: 放置 Display 元件
    default: true
  aase.scene.save:
    description: 儲存場景
    default: true
  aase.scene.share:
    description: 匯出 / 匯入分享
    default: true
  aase.export.command:
    description: 匯出 summon 指令
    default: true
  aase.animate:
    description: 使用關鍵影格動畫(P3)
    default: true
  aase.admin:
    description: 管理:編輯他人作品、reload、purge
    default: op
  aase.bypass.region:
    description: 略過領地檢查
    default: op
  aase.bypass.limit:
    description: 略過數量上限
    default: op
