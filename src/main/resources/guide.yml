# 遊戲內手冊(/aase guide 會給一本可翻頁的書)。
# 每一項 = 一頁,用 MiniMessage;書是紙底色,請用深色(<black>/<dark_*>),白色會看不到。
# /aase reload 生效。書頁窄(約一行 19 字、13 行),請保持簡短。

pages:
  - |-
    <dark_gray>◆ 盔甲座編輯器 ◆

    <black>完全不會擺?
    三步就好:

    <dark_green>1<black> /aase new 名字
    <dark_green>2<black> /aase addstand
    <dark_green>3<black> /aase presets

    <black>選盔甲座 → 點範本
    <gray>往後翻看更多 →
  - |-
    <dark_gray>① 開始一個作品

    <dark_blue>/aase new <名字>
    <black>開新作品

    <dark_blue>/aase tool
    <black>拿編輯工具

    <black>拿工具<dark_red>右鍵<black>點
    盔甲座 = 選取它
    <gray>(先選才能改)
  - |-
    <dark_gray>② 範本庫(最推薦)

    <dark_blue>/aase presets
    <black>打開圖形選單

    <dark_green>上排姿勢<black>=點就套用
    <dark_green>下排特效<black>=點就加
    <dark_aqua>鏡像<black>=左右對稱

    <black>擺好想留著:
    <dark_blue>/aase pose save id
  - |-
    <dark_gray>③ 自己微調(工具)

    <black>拿著工具:
    <dark_red>左鍵<black> 減 · <dark_green>右鍵<black> 加
    <black>滾輪 換步進
    潛行+滾輪 換軸
    潛行+左鍵 換模式
    潛行+右鍵 換部位

    <gray>看畫面下方讀數
  - |-
    <dark_gray>④ 控制面板

    <dark_blue>/aase
    <black>打開面板,點:
    · 模式 / 部位 / 軸
    · 微調 +/−
    · 旗標(隱形…)
    · 裝備 · 範本庫
    · 存檔 / 匯出 / 刪除
  - |-
    <dark_gray>⑤ 裝備與外觀

    <black>副手拿好裝備:
    <dark_blue>/aase setequip head
    <gray>(head/chest/legs/
     feet/mainhand/
     offhand)

    <black>開關(隱形等):
    <dark_blue>/aase flag small
  - |-
    <dark_gray>⑥ 粒子特效

    <dark_blue>/aase particle
      add FLAME
    <black>加一個發射器

    <dark_blue>/aase particle clear
    <black>清除全部

    <gray>用範本庫下排
    加特效更快
  - |-
    <dark_gray>⑦ 動畫(進階)

    <black>擺姿勢 → 記影格:
    <dark_blue>/aase anim key 0
    <black>換姿勢 →
    <dark_blue>/aase anim key 20
    <dark_blue>/aase anim length 20
    <dark_blue>/aase anim play

    <black>stop 停 · loop 循環
  - |-
    <dark_gray>⑧ 存檔與匯出

    <dark_blue>/aase save<black> 存檔
    <dark_blue>/aase load 名字<black> 放置
    <dark_blue>/aase list<black> 我的清單
    <dark_blue>/aase edit<black> 編輯附近

    <black>匯出成:
    <dark_blue>/aase export command
    <dark_blue>/aase export function
  - |-
    <dark_gray>⑨ 小提醒

    <black>· 只能改自己的
    · 會尊重領地保護
    · 作品會留在世界
    · <dark_blue>/aase close<black> 結束

    <gray>完整手冊在
    docs/MANUAL.md

    <black>玩得開心!
