# AwesomeArmorStandEditor — 玩家可見文字(MiniMessage)
# 繁體中文;可自由改成其他語言。指令名用 <aqua>,點擊提示用 <yellow>。

prefix: "<gold>✎</gold> "

system:
  no-permission: "<red>你沒有權限這麼做"
  player-only: "<red>這個指令只能玩家使用"

reload:
  ok: "<green>設定已重載"

usage:
  new: "<gray>用法:<aqua>/aase new <名稱>"
  load: "<gray>用法:<aqua>/aase load <名稱>"
  adddisplay: "<gray>用法:<aqua>/aase adddisplay <item|block|text>"
  setequip: "<gray>用法:<aqua>/aase setequip <head|chest|legs|feet|mainhand|offhand>"
  flag: "<gray>用法:<aqua>/aase flag <small|invisible|nobaseplate|nogravity|arms|marker|glowing>"
  particle: "<gray>用法:<aqua>/aase particle add <粒子類型></aqua> 或 <aqua>/aase particle clear"
  anim: "<gray>用法:<aqua>/aase anim <key <tick>|length <ticks>|loop|play|stop|clear>"
  export: "<gray>用法:<aqua>/aase export <command|function>"
  pose: "<gray>用法:<aqua>/aase pose <範本id></aqua> 套用,或 <aqua>/aase pose save <id> [名稱]</aqua> 存成自己的範本"
  fx: "<gray>用法:<aqua>/aase fx <特效id></aqua>(用 <aqua>/aase presets</aqua> 看清單)"
  import: "<gray>用法:<aqua>/aase import <分享碼> [新名稱]</aqua>(分享碼用 <aqua>/aase share</aqua> 產生)"
  admin: "<gray>用法:<aqua>/aase admin <whois|remove|purge <半徑> [玩家]|confirm>"
  clear: "<gray>用法:<aqua>/aase clear <半徑></aqua>(清掉別人放在你有建築權的地方的元件)"

# 管理工具(/aase admin,權限 aase.admin):處理別人亂放的作品
admin:
  no-target: "<red>附近沒有本插件放置的元件(玩家手放的原版盔甲座不歸這裡管)"
  whois: "<gray>擁有者 <white>{owner}</white> · 作品 <white>{scene}</white> · 元件 <white>#{id}"
  whois-where: "<gray>位置 <white>{world} {x} {y} {z}</white>{extra}"
  whois-emitter: " <dark_gray>(粒子發射器)"
  scene-missing: "已刪除的存檔"
  removed-one: "<green>已強制移除 <white>{owner}</white> 的元件 <white>#{id}"
  owner-not-found: "<red>找不到玩家 <white>{name}"
  purge-none: "<gray>半徑 {radius} 格內沒有可移除的元件"
  purge-preview: "<yellow>半徑 <white>{radius}</white> 格內有 <white>{count}</white> 個元件{owner}即將被移除"
  purge-preview-owner: "(只算 {owner} 的)"
  purge-confirm-hint: "<gray>確認請在 60 秒內輸入 <aqua>/aase admin confirm"
  purge-none-pending: "<red>沒有待確認的清除,先跑 <aqua>/aase admin purge <半徑>"
  purge-expired: "<red>確認已逾時,請重新跑一次 <aqua>/aase admin purge"
  purge-done: "<green>已移除 <white>{count}</white> 個元件(玩家的存檔沒有被刪,他們仍可重新放置)"
  loaded-only: "<dark_gray>只會影響已載入區塊內的元件"

clear:
  none: "<yellow>半徑 {radius} 格內沒有你能清除的元件(自己的作品請用編輯器刪,別人領地裡的東西不歸你清)"
  done: "<green>已清除 <white>{count}</white> 個元件,來自:<white>{owners}</white><gray>(他們的存檔沒有被刪,可以重新放置)"

session:
  none: "<red>你還沒有進行中的場景,先用 <aqua>/aase new <名稱></aqua> 開始"
  closed: "<green>已結束編輯(作品保留在世界中)"

scene:
  new: "<green>已建立場景 <white>{name}</white>,開始擺放吧"
  saved: "<green>已儲存 <white>{name}</white>(共 {count} 個元件)"
  loaded: "<green>已放置 <white>{name}</white>(共 {count} 個元件)"
  not-found: "<red>找不到名為 <white>{name}</white> 的場景"

add:
  stand: "<green>已新增盔甲座 <white>#{id}"
  display: "<green>已新增 Display <white>#{id}"

select:
  none: "<yellow>先右鍵點擊一個元件來選取"
  other-scene: "<red>那個元件屬於別的場景"

edit:
  begin: "<green>正在編輯既有作品 <white>{name}"
  no-target: "<red>附近沒有可編輯的元件"
  no-scene: "<red>找不到這個元件的存檔"
  not-owner: "<red>這不是你的作品"

delete:
  ok: "<green>已刪除元件 <white>#{id}"

limit:
  per-player: "<red>你的元件數量已達上限({max})"
  global: "<red>伺服器元件總數已達上限"
  per-chunk: "<red>這個區塊的元件數量已達上限({max})"

region:
  denied: "<red>這裡受保護,無法在此放置或編輯"

payload:
  wrong-kind: "<red>選取的元件不是對應的 Display 類型"
  offhand-empty: "<yellow>把想要的物品拿在副手,再執行一次"
  set: "<green>已更新內容"

name:
  only-stand: "<red>只有盔甲座能設定名稱"
  set: "<green>已更新名稱"

equip:
  only-stand: "<red>只有盔甲座能穿裝備"
  bad-slot: "<red>未知的裝備欄位"
  set: "<green>已更新 <white>{slot}</white> 裝備(以副手物品為準)"
  hint: "<yellow>把物品拿在副手,執行 <aqua>/aase setequip <head|chest|legs|feet|mainhand|offhand>"

equip-menu:
  title: "裝備 · 先拿起物品再點格子"
  only-stand: "<red>先右鍵選一個盔甲座,才能開裝備選單"
  info: "<gold>用法:在下面背包點一下物品(拿到游標)→ 再點裝備格子=裝上;游標空著點格子=卸下。不會消耗你的物品"
  head: "<white>頭盔"
  chest: "<white>胸甲"
  legs: "<white>護腿"
  feet: "<white>靴子"
  mainhand: "<white>主手"
  offhand: "<white>副手"
  empty-hint: "<gray>先在背包拿起物品到游標,再點這裡裝上"
  filled-hint: "<gray>游標拿著物品點=更換 · 游標空著點=卸下"
  back: "<yellow>← 回控制面板"

flag:
  only-stand: "<red>只有盔甲座能切換這些開關"
  toggled: "<green>已切換 <white>{flag}"

export:
  empty: "<yellow>這個場景還沒有任何元件"
  click: "<yellow>[點擊複製 summon 指令到剪貼簿]"
  saved: "<gray>也已存成檔案:<white>{path}"
  mcfunction-saved: "<green>已匯出 mcfunction 資料包到 <white>{path}"

share:
  click: "<yellow>[點擊複製分享碼到剪貼簿]"
  hint: "<gray>把這串碼給別人,他們用 <aqua>/aase import <碼></aqua> 就能拿到同一份作品"
  import-bad: "<red>分享碼無效或已損毀,請確認完整複製"
  import-too-big: "<red>這份作品的元件太多(超過你的上限 {max}),無法匯入"
  imported: "<green>已匯入並放置 <white>{name}</white>(共 {count} 個元件),記得 <aqua>/aase save</aqua> 存起來"
  place-cancelled: "<red>這裡不允許放置作品"

