  selected: "<gray>目前選取 <white>#{id}</white>({type})"
  dirty: "<gray>狀態:<white>{state}"

particle:
  invalid: "<red>未知的粒子類型 <white>{type}</white>(用 tab 補全看可用清單)"
  added: "<green>已加入粒子發射器 <white>{type}"
  cleared: "<green>已清除這個場景的所有粒子發射器"

anim:
  key: "<green>已在 tick <white>{tick}</white> 記錄元件 <white>#{id}</white> 的關鍵影格"
  length: "<green>動畫長度設為 <white>{ticks}</white> tick"
  loop-on: "<green>動畫循環:開"
  loop-off: "<green>動畫循環:關"
  playing: "<green>播放動畫中(再 <aqua>/aase anim stop</aqua> 停止)"
  stopped: "<green>已停止動畫,元件回到存檔狀態"
  cleared: "<green>已清除動畫"
  empty: "<yellow>還沒有關鍵影格,先用 <aqua>/aase anim key <tick></aqua> 記錄"

preset:
  only-stand: "<red>先右鍵選一個盔甲座,才能套用姿勢範本"
  pose-missing: "<red>沒有這個姿勢範本:<white>{id}"
