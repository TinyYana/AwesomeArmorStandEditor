# AwesomeArmorStandEditor — 繁體中文(MiniMessage)
# 這一份是所有玩家可見文字。要換語言:config.yml 的 language(auto / zh_TW / en)。
# 想自訂:直接改這個檔,/aase reload 生效。指令名用 <aqua>,點擊提示用 <yellow>。

prefix: "<gold>✎</gold> "

system:
  no-permission: "<red>你沒有權限這麼做"
  player-only: "<red>這個指令只能玩家使用"

reload:
  ok: "<green>設定已重載"

usage:
  new: "<gray>用法:<aqua>/aase new <名稱>"
  load: "<gray>用法:<aqua>/aase load <名稱>"
  adddisplay: "<gray>用法:<aqua>/aase adddisplay <item|block|text>"
  setequip: "<gray>用法:<aqua>/aase setequip <head|chest|legs|feet|mainhand|offhand>"
  flag: "<gray>用法:<aqua>/aase flag <small|invisible|nobaseplate|nogravity|arms|marker|glowing>"
  particle: "<gray>用法:<aqua>/aase particle add <粒子類型></aqua> 或 <aqua>/aase particle clear"
  anim: "<gray>用法:<aqua>/aase anim <key <tick>|length <ticks>|loop|play|stop|clear>"
  export: "<gray>用法:<aqua>/aase export <command|function>"
  pose: "<gray>用法:<aqua>/aase pose <範本id></aqua> 套用,或 <aqua>/aase pose save <id> [名稱]</aqua> 存成自己的範本"
  fx: "<gray>用法:<aqua>/aase fx <特效id></aqua>(用 <aqua>/aase presets</aqua> 看清單)"
  import: "<gray>用法:<aqua>/aase import <分享碼> [新名稱]</aqua>(分享碼用 <aqua>/aase share</aqua> 產生)"
  select: "<gray>用法:<aqua>/aase select <元件編號|next|prev>"
  admin: "<gray>用法:<aqua>/aase admin <whois|remove|purge <半徑> [玩家]|confirm>"
  clear: "<gray>用法:<aqua>/aase clear <半徑></aqua>(清掉別人放在你有建築權的地方的元件)"

# 管理工具(/aase admin,權限 aase.admin):處理別人亂放的作品
