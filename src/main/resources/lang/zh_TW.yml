  whois-where: "<gray>位置 <white>{world} {x} {y} {z}</white>{extra}"
  whois-emitter: " <dark_gray>(粒子發射器)"
  scene-missing: "已刪除的存檔"
  removed-one: "<green>已強制移除 <white>{owner}</white> 的元件 <white>#{id}"
  owner-not-found: "<red>找不到玩家 <white>{name}"
  purge-none: "<gray>半徑 {radius} 格內沒有可移除的元件"
  purge-preview: "<yellow>半徑 <white>{radius}</white> 格內有 <white>{count}</white> 個元件{owner}即將被移除"
  purge-preview-owner: "(只算 {owner} 的)"
  purge-confirm-hint: "<gray>確認請在 60 秒內輸入 <aqua>/aase admin confirm"
