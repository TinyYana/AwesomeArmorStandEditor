# README.txt inside the datapack that /aase export function writes
export-readme:
  head: |-
    AwesomeArmorStandEditor datapack export (best effort)

    Drop it in your world's datapacks/<name>/, or a .minecraft datapack folder.
    - function {ns}:summon  summons the whole scene where you stand
  anim: |-
    - function {ns}:load    initializes the timer (run once before playing)
    - function {ns}:tick    starts keyframe playback (reschedules itself every tick)
  foot: |-
    Note: pack_format and the function folder name are version-sensitive; NBT is best-effort.

# The in-game manual (/aase guide gives a paginated book). Each item = one page, MiniMessage.
# The book has a parchment background — use dark colors (<black>/<dark_*>); white is invisible.
# Pages are narrow (~19 characters, 13 lines). Keep them short.
guide:
  book-title: "Armor Stand Editor Manual"
  pages:
    - |-
      <dark_gray>◆ AASE Guide ◆

      <black>Never posed one?
      Three steps:

      <dark_green>1<black> /aase new name
      <dark_green>2<black> /aase addstand
      <dark_green>3<black> /aase presets

      <black>Pick a stand, then
      click a preset.
      <gray>Turn the page →
    - |-
      <dark_gray>① Start a build

      <dark_blue>/aase new <name>
      <black>New scene

      <dark_blue>/aase tool
      <black>Get the tool

      <black>Hold it, <dark_red>right
      click<black> a stand
      = select it
      <gray>(select to edit)
    - |-
      <dark_gray>② Preset gallery

      <dark_blue>/aase presets
      <black>Opens a menu

      <dark_green>Top row<black> = poses
      <dark_green>Bottom<black> = effects
      <dark_aqua>Mirror<black> = symmetry

      <black>Keep your pose:
      <dark_blue>/aase pose save id
    - |-
      <dark_gray>③ Fine-tune

      <black>Holding the tool:
      <dark_red>Left<black> − · <dark_green>Right<black> +
      <black>Scroll: step size
      Sneak+scroll: axis
      Sneak+left: mode
      Sneak+right: part

      <gray>Watch the bar at
      the bottom
    - |-
      <dark_gray>④ Control panel

      <dark_blue>/aase
      <black>Opens the panel:
      · mode/part/axis
      · nudge +/−
      · flags (invisible)
      · equipment
      · presets
      · save / export /
        delete
    - |-
      <dark_gray>⑤ Equipment

      <dark_blue>/aase equip
      <black>Opens the menu:
      click an item in
      your inventory
      (to the cursor),
      then click a slot
      = equip; empty
      cursor = unequip

      <black>Flags:
      <dark_blue>/aase flag small
    - |-
      <dark_gray>⑥ Particle FX

      <dark_blue>/aase particle
        add FLAME
      <black>Adds an emitter

      <dark_blue>/aase particle clear
      <black>Removes all

      <gray>The gallery's
      bottom row is
      faster
    - |-
      <dark_gray>⑦ Animation

      <black>Pose, then key it:
      <dark_blue>/aase anim key 0
      <black>Repose, then →
      <dark_blue>/aase anim key 20
      <dark_blue>/aase anim length 20
      <dark_blue>/aase anim play

      <black>stop · loop
    - |-
      <dark_gray>⑧ Save & share

      <dark_blue>/aase save<black> save
      <dark_blue>/aase load name<black> place
      <dark_blue>/aase list<black> your saves
      <dark_blue>/aase info<black> scene info

      <black>Share it:
      <dark_blue>/aase share<black> get code
      <dark_blue>/aase import code
    - |-
      <dark_gray>⑨ Export

      <black>These two write
      files on the
      server — admins
      and builders only
      by default:

      <dark_blue>/aase export command
      <dark_blue>/aase export function
      <dark_blue>/aase pose save id
    - |-
      <dark_gray>⑩ Reminders

      <black>· Only your own
      · Land claims are
        respected
      · Builds stay in
        the world
      · <dark_blue>/aase close<black> ends

      <gray>Full manual:
      docs/MANUAL.en.md

      <black>Have fun!
