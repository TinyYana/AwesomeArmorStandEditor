# AwesomeArmorStandEditor — English (MiniMessage)
# Every player-facing string lives here. Switch languages with `language` in config.yml
# (auto / zh_TW / en). Edit this file freely, then /aase reload.

prefix: "<gold>✎</gold> "

system:
  no-permission: "<red>You don't have permission to do that"
  player-only: "<red>That command can only be run by a player"

reload:
  ok: "<green>Config reloaded"

usage:
  new: "<gray>Usage: <aqua>/aase new <name>"
  load: "<gray>Usage: <aqua>/aase load <name>"
  adddisplay: "<gray>Usage: <aqua>/aase adddisplay <item|block|text>"
  setequip: "<gray>Usage: <aqua>/aase setequip <head|chest|legs|feet|mainhand|offhand>"
  flag: "<gray>Usage: <aqua>/aase flag <small|invisible|nobaseplate|nogravity|arms|marker|glowing>"
  particle: "<gray>Usage: <aqua>/aase particle add <particle type></aqua> or <aqua>/aase particle clear"
  anim: "<gray>Usage: <aqua>/aase anim <key tick|length ticks|loop|play|stop|clear>"
  export: "<gray>Usage: <aqua>/aase export <command|function>"
  pose: "<gray>Usage: <aqua>/aase pose <preset id></aqua> to apply, or <aqua>/aase pose save <id> [name]</aqua> to save your own"
  fx: "<gray>Usage: <aqua>/aase fx <effect id></aqua> (see the list with <aqua>/aase presets</aqua>)"
  import: "<gray>Usage: <aqua>/aase import <share code> [new name]</aqua> (get a code with <aqua>/aase share</aqua>)"
  select: "<gray>Usage: <aqua>/aase select <element id|next|prev>"
  admin: "<gray>Usage: <aqua>/aase admin <whois|remove|purge <radius> [player]|confirm>"
  clear: "<gray>Usage: <aqua>/aase clear <radius></aqua> (removes other people's elements where you may build)"

# Admin tools (/aase admin, permission aase.admin): dealing with other people's builds
admin:
  no-target: "<red>No element placed by this plugin nearby (hand-placed vanilla armor stands aren't ours)"
  whois: "<gray>Owner <white>{owner}</white> · scene <white>{scene}</white> · element <white>#{id}"
  whois-where: "<gray>At <white>{world} {x} {y} {z}</white>{extra}"
  whois-emitter: " <dark_gray>(particle emitter)"
  scene-missing: "deleted save"
  removed-one: "<green>Force-removed <white>{owner}</white>'s element <white>#{id}"
  owner-not-found: "<red>No such player: <white>{name}"
  purge-none: "<gray>Nothing to remove within {radius} blocks"
  purge-preview: "<yellow><white>{count}</white> element(s){owner} within <white>{radius}</white> blocks will be removed"
  purge-preview-owner: " owned by {owner}"
  purge-confirm-hint: "<gray>Type <aqua>/aase admin confirm</aqua> within 60 seconds to confirm"
  purge-none-pending: "<red>Nothing pending — run <aqua>/aase admin purge <radius></aqua> first"
  purge-expired: "<red>Confirmation timed out, run <aqua>/aase admin purge</aqua> again"
  purge-done: "<green>Removed <white>{count}</white> element(s) (their saves are untouched — they can place them again)"
  loaded-only: "<dark_gray>Only affects elements in loaded chunks"

clear:
  none: "<yellow>Nothing you may remove within {radius} blocks (delete your own builds in the editor; other people's claims aren't yours to clear)"
  done: "<green>Removed <white>{count}</white> element(s) from: <white>{owners}</white><gray> (their saves are untouched — they can place them again)"

session:
  none: "<red>No scene in progress — start one with <aqua>/aase new <name></aqua>"
  closed: "<green>Editing finished (the build stays in the world)"

scene:
  new: "<green>Created scene <white>{name}</white> — start placing"
  saved: "<green>Saved <white>{name}</white> ({count} elements)"
  loaded: "<green>Placed <white>{name}</white> ({count} elements)"
  not-found: "<red>No scene named <white>{name}</white>"

add:
  stand: "<green>Added armor stand <white>#{id}"
  display: "<green>Added display <white>#{id}"

select:
  none: "<yellow>Right-click an element to select it first"
  other-scene: "<red>That element belongs to a different scene"
  done: "<green>Selected <white>#{id}</white> ({type})"
  bad-id: "<red>No such element id. This scene has: <white>{ids}"

edit:
  begin: "<green>Now editing existing build <white>{name}"
  no-target: "<red>No editable element nearby"
  no-scene: "<red>No save found for this element"
  not-owner: "<red>That's not your build"

delete:
  ok: "<green>Deleted display <white>#{id}"
  changed: "<yellow>That display is no longer in the build; nothing else was deleted"

limit:
  per-player: "<red>You've hit your element cap ({max})"
  global: "<red>The server's total element cap has been reached"
  per-chunk: "<red>This chunk has hit its element cap ({max})"

region:
  denied: "<red>This area is protected — you can't place or edit here"

payload:
