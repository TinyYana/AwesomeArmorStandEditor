<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="560" rx="14" fill="#f4ecd8" stroke="#8a7550" stroke-width="2"/>
  <text x="30" y="38" font-size="20" font-weight="700" fill="#3b2f22">Control Panel GUI · 控制面板</text>
  <text x="30" y="60" font-size="13" fill="#6b5a3e">/aase — a 6-row inventory menu; click almost everything, no commands needed</text>

  <!-- grid: 9 cols x 6 rows -->
  <g transform="translate(30,80)">
    <!-- row backgrounds with labels -->
    <!-- Row 1: info / add -->
    <rect x="0" y="0" width="720" height="72" rx="8" fill="#ffffff" stroke="#c9b183"/>
    <g font-size="22">
      <rect x="8" y="8" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="36" y="44" text-anchor="middle">ℹ️</text>
      <rect x="72" y="8" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="100" y="44" text-anchor="middle">📖</text>
      <rect x="592" y="8" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="620" y="44" text-anchor="middle">🧍</text>
      <rect x="656" y="8" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="684" y="44" text-anchor="middle">📦</text>
    </g>
    <text x="736" y="24" font-size="12.5" font-weight="700" fill="#3b2f22">Row 1</text>
    <text x="736" y="42" font-size="11.5" fill="#6b5a3e">info · guide book</text>
    <text x="736" y="58" font-size="11.5" fill="#6b5a3e">add stand / display</text>

    <!-- Row 2: mode -->
    <rect x="0" y="80" width="720" height="72" rx="8" fill="#ffffff" stroke="#c9b183"/>
    <g font-size="20">
      <rect x="8" y="88" width="56" height="56" rx="6" fill="#fff3d6"/><text x="36" y="124" text-anchor="middle">↔️</text>
      <rect x="72" y="88" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="100" y="124" text-anchor="middle">🧎</text>
      <rect x="136" y="88" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="164" y="124" text-anchor="middle">➡️</text>
      <rect x="200" y="88" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="228" y="124" text-anchor="middle">🔄</text>
      <rect x="264" y="88" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="292" y="124" text-anchor="middle">🔍</text>
    </g>
    <text x="736" y="104" font-size="12.5" font-weight="700" fill="#3b2f22">Row 2</text>
    <text x="736" y="122" font-size="11.5" fill="#6b5a3e">mode: move / pose /</text>
    <text x="736" y="138" font-size="11.5" fill="#6b5a3e">translate / rotate / scale</text>

    <!-- Row 3: body part -->
    <rect x="0" y="160" width="720" height="72" rx="8" fill="#ffffff" stroke="#c9b183"/>
    <g font-size="20">
      <rect x="8" y="168" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="36" y="204" text-anchor="middle">🗿</text>
      <rect x="72" y="168" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="100" y="204" text-anchor="middle">🫁</text>
      <rect x="136" y="168" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="164" y="204" text-anchor="middle">💪</text>
      <rect x="200" y="168" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="228" y="204" text-anchor="middle">💪</text>
      <rect x="264" y="168" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="292" y="204" text-anchor="middle">🦵</text>
      <rect x="328" y="168" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="356" y="204" text-anchor="middle">🦵</text>
    </g>
    <text x="736" y="184" font-size="12.5" font-weight="700" fill="#3b2f22">Row 3</text>
    <text x="736" y="202" font-size="11.5" fill="#6b5a3e">body part: head / body /</text>
    <text x="736" y="218" font-size="11.5" fill="#6b5a3e">arms / legs</text>

    <!-- Row 4: axis + nudge -->
    <rect x="0" y="240" width="720" height="72" rx="8" fill="#ffffff" stroke="#c9b183"/>
    <g font-size="18">
      <rect x="8" y="248" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="36" y="284" text-anchor="middle">X</text>
      <rect x="72" y="248" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="100" y="284" text-anchor="middle">Y</text>
      <rect x="136" y="248" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="164" y="284" text-anchor="middle">Z</text>
      <rect x="200" y="248" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="228" y="284" text-anchor="middle">−step</text>
      <rect x="264" y="248" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="292" y="284" text-anchor="middle">+step</text>
      <rect x="328" y="248" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="356" y="284" text-anchor="middle">−nudge</text>
      <rect x="392" y="248" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="420" y="284" text-anchor="middle">+nudge</text>
    </g>
    <text x="736" y="264" font-size="12.5" font-weight="700" fill="#3b2f22">Row 4</text>
    <text x="736" y="282" font-size="11.5" fill="#6b5a3e">axis X/Y/Z + step ± /</text>
    <text x="736" y="298" font-size="11.5" fill="#6b5a3e">nudge ±</text>

    <!-- Row 5: flags -->
    <rect x="0" y="320" width="720" height="72" rx="8" fill="#ffffff" stroke="#c9b183"/>
    <g font-size="18">
      <rect x="8" y="328" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="36" y="364" text-anchor="middle">🐣</text>
      <rect x="72" y="328" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="100" y="364" text-anchor="middle">👻</text>
      <rect x="136" y="328" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="164" y="364" text-anchor="middle">⬜</text>
      <rect x="200" y="328" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="228" y="364" text-anchor="middle">🪶</text>
      <rect x="264" y="328" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="292" y="364" text-anchor="middle">🙆</text>
      <rect x="328" y="328" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="356" y="364" text-anchor="middle">📍</text>
      <rect x="392" y="328" width="56" height="56" rx="6" fill="#eaf3ee"/><text x="420" y="364" text-anchor="middle">✨</text>
    </g>
    <text x="736" y="344" font-size="12.5" font-weight="700" fill="#3b2f22">Row 5</text>
    <text x="736" y="362" font-size="11.5" fill="#6b5a3e">flags: small / invisible /</text>
    <text x="736" y="378" font-size="11.5" fill="#6b5a3e">no-baseplate / no-gravity /</text>
    <text x="736" y="394" font-size="11.5" fill="#6b5a3e">arms / marker / glowing</text>

    <!-- Row 6: bottom actions -->
    <rect x="0" y="400" width="720" height="72" rx="8" fill="#fff7e8" stroke="#c9962c"/>
    <g font-size="20">
      <rect x="8" y="408" width="56" height="56" rx="6" fill="#ffffff"/><text x="36" y="444" text-anchor="middle">✦</text>
      <rect x="72" y="408" width="56" height="56" rx="6" fill="#ffffff"/><text x="100" y="444" text-anchor="middle">💾</text>
      <rect x="136" y="408" width="56" height="56" rx="6" fill="#ffffff"/><text x="164" y="444" text-anchor="middle">📤</text>
      <rect x="200" y="408" width="56" height="56" rx="6" fill="#ffffff"/><text x="228" y="444" text-anchor="middle">🗑️</text>
      <rect x="656" y="408" width="56" height="56" rx="6" fill="#ffffff"/><text x="684" y="444" text-anchor="middle">✖️</text>
    </g>
    <text x="736" y="424" font-size="12.5" font-weight="700" fill="#7a5a12">Row 6</text>
    <text x="736" y="442" font-size="11.5" fill="#6b5a3e">presets · save · export ·</text>
    <text x="736" y="458" font-size="11.5" fill="#6b5a3e">delete · close</text>
  </g>

  <text x="30" y="540" font-size="11.5" fill="#8a7550">Export buttons are hidden entirely for players without aase.export.command — the GUI enforces the same permission as the command.</text>
</svg>
