<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a7550"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1000" height="380" rx="14" fill="#f4ecd8" stroke="#8a7550" stroke-width="2"/>
  <text x="30" y="38" font-size="20" font-weight="700" fill="#3b2f22">Three Core Concepts · 先懂三個概念</text>

  <!-- Scene box -->
  <rect x="30" y="70" width="260" height="260" rx="10" fill="#ffffff" stroke="#4f8f6b" stroke-width="2"/>
  <text x="160" y="98" font-size="15" font-weight="700" fill="#2e5c43" text-anchor="middle">Scene 場景</text>
  <text x="160" y="116" font-size="11.5" fill="#6b5a3e" text-anchor="middle">one save file · 一份存檔</text>
  <rect x="48" y="130" width="224" height="34" rx="6" fill="#eaf3ee" stroke="#c9dccf"/>
  <text x="160" y="151" font-size="12" fill="#3b2f22" text-anchor="middle">Element #1 · Armor Stand</text>
  <rect x="48" y="172" width="224" height="34" rx="6" fill="#eaf3ee" stroke="#c9dccf"/>
  <text x="160" y="193" font-size="12" fill="#3b2f22" text-anchor="middle">Element #2 · Item Display</text>
  <rect x="48" y="214" width="224" height="34" rx="6" fill="#eaf3ee" stroke="#c9dccf"/>
  <text x="160" y="235" font-size="12" fill="#3b2f22" text-anchor="middle">Particle emitters</text>
  <rect x="48" y="256" width="224" height="34" rx="6" fill="#eaf3ee" stroke="#c9dccf"/>
  <text x="160" y="277" font-size="12" fill="#3b2f22" text-anchor="middle">Keyframe animation</text>
  <text x="160" y="312" font-size="11.5" fill="#6b5a3e" text-anchor="middle">= the "blueprint" 藍圖</text>

  <line x1="290" y1="150" x2="360" y2="110" stroke="#8a7550" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <line x1="290" y1="200" x2="360" y2="200" stroke="#8a7550" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <line x1="290" y1="250" x2="360" y2="290" stroke="#8a7550" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="300" y="140" font-size="11" fill="#6b5a3e">/aase load</text>
  <text x="300" y="195" font-size="11" fill="#6b5a3e">/aase load</text>
  <text x="300" y="278" font-size="11" fill="#6b5a3e">/aase share → import</text>

  <!-- placements in world -->
  <g>
    <rect x="360" y="70" width="200" height="80" rx="10" fill="#fff7e8" stroke="#c9962c" stroke-width="2"/>
    <text x="460" y="98" font-size="13" font-weight="700" fill="#7a5a12" text-anchor="middle">Placement A</text>
    <text x="460" y="116" font-size="11.5" fill="#6b5a3e" text-anchor="middle">spawn point in world</text>
    <text x="460" y="134" font-size="11" fill="#6b5a3e" text-anchor="middle">世界中的一次放置</text>
  </g>
  <g>
    <rect x="360" y="160" width="200" height="80" rx="10" fill="#fff7e8" stroke="#c9962c" stroke-width="2"/>
    <text x="460" y="188" font-size="13" font-weight="700" fill="#7a5a12" text-anchor="middle">Placement B</text>
    <text x="460" y="206" font-size="11.5" fill="#6b5a3e" text-anchor="middle">same scene, another spot</text>
    <text x="460" y="224" font-size="11" fill="#6b5a3e" text-anchor="middle">同一存檔,不同位置</text>
  </g>
  <g>
    <rect x="360" y="250" width="200" height="80" rx="10" fill="#fff7e8" stroke="#c9962c" stroke-width="2"/>
    <text x="460" y="278" font-size="13" font-weight="700" fill="#7a5a12" text-anchor="middle">Placement C</text>
    <text x="460" y="296" font-size="11.5" fill="#6b5a3e" text-anchor="middle">imported by another player</text>
    <text x="460" y="314" font-size="11" fill="#6b5a3e" text-anchor="middle">別人 /aase import 匯入</text>
  </g>

  <!-- Ownership + persistence note -->
  <rect x="600" y="70" width="370" height="260" rx="10" fill="#ffffff" stroke="#b5473f" stroke-width="1.5"/>
  <text x="620" y="98" font-size="14" font-weight="700" fill="#8a352d">Two rules to remember 兩個規則</text>

  <text x="620" y="130" font-size="12.5" font-weight="700" fill="#3b2f22">① Ownership 擁有權</text>
  <text x="620" y="150" font-size="12" fill="#6b5a3e">Every element remembers its creator.</text>
  <text x="620" y="167" font-size="12" fill="#6b5a3e">Only the owner can edit it; others can't</text>
  <text x="620" y="184" font-size="12" fill="#6b5a3e">break or take it. 只能編輯自己的作品</text>

  <text x="620" y="220" font-size="12.5" font-weight="700" fill="#3b2f22">② Persists in the world 會留在世界</text>
  <text x="620" y="240" font-size="12" fill="#6b5a3e">A placement is a real entity — it stays</text>
  <text x="620" y="257" font-size="12" fill="#6b5a3e">like any armor stand. Deleting it in the</text>
  <text x="620" y="274" font-size="12" fill="#6b5a3e">world does NOT delete the save file.</text>
  <text x="620" y="291" font-size="12" fill="#6b5a3e">Use /aase edit to re-bind and continue</text>
  <text x="620" y="308" font-size="12" fill="#6b5a3e">editing it (no duplicate is created).</text>
</svg>
