name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build (compile + unit tests + shaded jar)
        run: |
          chmod +x gradlew
          ./gradlew build

      - uses: actions/upload-artifact@v4
        with:
          name: AwesomeArmorStandEditor-jar
          path: |
            build/libs/*.jar
            !build/libs/*-thin.jar
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: AwesomeArmorStandEditor-jar
          path: build/libs

      - name: Extract this version's changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) { found=1; next } }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "_No CHANGELOG.md section found for ${GITHUB_REF_NAME} — see commit history._" > release-notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          body_path: release-notes.md
          generate_release_notes: true
